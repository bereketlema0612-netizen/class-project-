<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bense Secondary High School - Admin Login</title>
    <link rel="stylesheet" href="admin-login-styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="admin-login-container">
        <div class="admin-login-card">
            <!-- Header -->
            <div class="login-header">
                <div class="admin-icon">
                    <i class="fas fa-crown"></i>
                </div>
                <h1 class="school-name">Bense Secondary High School</h1>
                <p class="system-title">ADMIN PORTAL</p>
            </div>

            <!-- Admin Login Form -->
            <form class="login-form" id="adminLoginForm" onsubmit="handleAdminLogin(event)">
                <div class="form-group">
                    <label for="adminUsername">
                        <i class="fas fa-user"></i> Username or Email
                    </label>
                    <input 
                        type="text" 
                        id="adminUsername" 
                        class="form-control" 
                        placeholder="Enter your admin username or email"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="adminPassword">
                        <i class="fas fa-lock"></i> Password
                    </label>
                    <div class="password-input-wrapper">
                        <input 
                            type="password" 
                            id="adminPassword" 
                            class="form-control" 
                            placeholder="Enter your admin password"
                            required
                        >
                        <button type="button" class="password-toggle" onclick="togglePasswordVisibility('adminPassword')">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="remember-me">
                    <input type="checkbox" id="rememberMe" name="rememberMe">
                    <label for="rememberMe">Remember me on this device</label>
                </div>

                <button type="submit" class="login-button">
                    <span>Login to Admin Panel</span>
                    <i class="fas fa-sign-in-alt"></i>
                </button>
            </form>

            <!-- Footer Links -->
            <div class="login-footer">
                <div class="footer-links">
                    <a href="login.html" class="footer-link">
                        <i class="fas fa-arrow-left"></i> Back to Main Login
                    </a>
                </div>
                <p class="security-note">
                    <i class="fas fa-shield-alt"></i> Secure login - Only authorized administrators
                </p>
            </div>
        </div>

        <!-- Side Info -->
        <div class="admin-info">
            <h2>Administrator Access</h2>
            <ul class="admin-features">
                <li><i class="fas fa-check-circle"></i> Registration Management</li>
                <li><i class="fas fa-check-circle"></i> User Administration</li>
                <li><i class="fas fa-check-circle"></i> System Reports</li>
                <li><i class="fas fa-check-circle"></i> School Settings</li>
                <li><i class="fas fa-check-circle"></i> Audit & Logs</li>
                <li><i class="fas fa-check-circle"></i> Announcements</li>
            </ul>
        </div>
    </div>

    <script src="admin-login-script.js?v=20260304-2"></script>
</body>
</html>
