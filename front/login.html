<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bense Secondary High School - Administrative System Login</title>
    <link rel="stylesheet" href="login-styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <!-- Header -->
            <div class="login-header">
                <h1 class="school-name">Bense Secondary High School</h1>
                <p class="system-title"> LOGIN FORM</p>
            </div>

            <!-- Toggle Buttons -->
            <div class="login-toggle">
                <button class="toggle-btn active" id="studentToggle" onclick="switchLoginMode('student')">
                    <i class="fas fa-graduation-cap"></i> Student
                </button>
                <button class="toggle-btn" id="staffToggle" onclick="switchLoginMode('staff')">
                    <i class="fas fa-user-tie"></i> Staff
                </button>
            </div>
            <div id="loginMessage" class="login-message" style="display:none;"></div>

            <!-- Login Forms -->
            <form class="login-form active" id="studentForm" onsubmit="handleLogin(event, 'student')">
                <div class="form-group">
                    <label for="studentUsername">Student ID / Username</label>
                    <input 
                        type="text" 
                        id="studentUsername" 
                        class="form-control" 
                        placeholder="Enter your Student ID or Username"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="studentPassword">Password</label>
                    <div class="password-input-wrapper">
                        <input 
                            type="password" 
                            id="studentPassword" 
                            class="form-control" 
                            placeholder="Enter your password"
                            required
                        >
                        <button type="button" class="password-toggle" onclick="togglePasswordVisibility('studentPassword')">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

               
                <button type="submit" class="login-button">
                    <span>Login</span>
                    <i class="fas fa-arrow-right"></i>
                </button>
            </form>

            <form class="login-form" id="staffForm" onsubmit="handleLogin(event, 'staff')">
                <div class="form-group">
                    <label for="staffUsername">Staff Username</label>
                    <input 
                        type="text" 
                        id="staffUsername" 
                        class="form-control" 
                        placeholder="Teacher / Admin / Director username"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="staffPassword">Password</label>
                    <div class="password-input-wrapper">
                        <input 
                            type="password" 
                            id="staffPassword" 
                            class="form-control" 
                            placeholder="Enter your password"
                            required
                        >
                        <button type="button" class="password-toggle" onclick="togglePasswordVisibility('staffPassword')">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>


                <button type="submit" class="login-button">
                    <span>Login</span>
                    <i class="fas fa-arrow-right"></i>
                </button>
            </form>

            <!-- Footer Info -->
            <div class="login-footer">
                <p class="footer-text">For technical support, contact IT Department</p>
                <p class="footer-text small">© 2025 Bense Secondary High School. All rights reserved.</p>
            </div>
        </div>

        <!-- Background decoration -->
        <div class="decoration decoration-top"></div>
        <div class="decoration decoration-bottom"></div>
    </div>

    <script src="login-script.js?v=20260330-2"></script>
</body>
</html>
